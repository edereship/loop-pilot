name: "LoopPilot — post-fix"
description: "Scope check, CHECK_COMMAND, commit/push, state update, and re-review request after claude-code-action."

inputs:
  github-token:
    description: "GitHub token with contents:write, pull-requests:write, issues:write"
    required: true
  codex-review-request-token:
    description: "Optional token from a Codex-connected user for posting @codex review"
    required: false
    default: ""
  looppilot-push-token:
    description: "Optional token used only for repair commit pushes; defaults to github-token when unset"
    required: false
    default: ""
  pr-number:
    description: "Pull request number"
    required: true
  pr-head-ref:
    description: "PR head branch ref name"
    required: true
  pr-title:
    description: "PR title (kept for parity with pre-fix; unused by post-fix today)"
    required: false
    default: ""
  comment-id:
    description: "Hidden state comment id (output of pre-fix)"
    required: true
  iteration:
    description: "Iteration count (output of pre-fix)"
    required: true
  trigger-comment-id:
    description: "Trigger comment id (output of pre-fix)"
    required: false
    default: "0"
  check-command:
    description: "CHECK_COMMAND (output of pre-fix; can also fall back to wrapping workflow)"
    required: false
    default: "npm run check"
  build-command:
    description: "Optional shell command run after CHECK_COMMAND succeeds, before staging (TY-281). Use this to regenerate build artifacts that are committed to the repo (e.g. `dist/`) so the auto-fix commit cannot drift out of sync with `src/`. Empty default skips the step; chain multiple steps with `&&` or wrap in an npm script. Generated files are re-scope-checked against `looppilot-block-paths` / `scope-max-*` before commit."
    required: false
    default: ""
  action-outcome:
    description: "GitHub Actions step.outcome of the preceding claude-code-action step (success | failure | cancelled | skipped)."
    required: false
    default: "success"
  action-execution-file:
    description: "Optional path to the claude-code-action execution output file. Used to distinguish max_turns_exceeded from generic action_failure."
    required: false
    default: ""
  github-repository:
    description: "Repository in owner/name format (auto-detected in GitHub Actions)"
    required: false
    default: ""
  looppilot-block-paths:
    description: "`.gitignore`-style block-path spec (TY-271). Comma-separated entries: `secrets/` (dir prefix), `Justfile` (exact file), `!Makefile` (un-block a default). `!.github/...` is ignored — `.github/` is locked. Empty default keeps the built-in `DEFAULT_BLOCK_PATTERNS`. See docs/operations/scope-policy.md."
    required: false
    default: ""
  scope-max-files:
    description: "Max files allowed in a single auto-fix diff. Empty / 0 keeps the default of 20. Leave empty so `LOOPPILOT_SCOPE_MAX_FILES` Repository variable can override; `core.getInput` treats `\"0\"` as non-empty and would shadow the env-var fallback."
    required: false
    default: ""
  scope-max-lines:
    description: "Max total added+deleted lines allowed in a single auto-fix diff. Empty / 0 keeps the default of 1000. Leave empty so `LOOPPILOT_SCOPE_MAX_LINES` Repository variable can override."
    required: false
    default: ""
  looppilot-hard-block-override:
    description: "[DEPRECATED — TY-271, removed in next minor] Use `looppilot-block-paths` with the `!path` syntax. Existing values are folded into the new spec as removals, but emit a warning."
    required: false
    default: ""
  scope-allowed-path-prefixes:
    description: "[DEPRECATED — TY-271, removed in next minor] The allow-list concept is gone; values are ignored with a warning. The scope check is now a pure block-list."
    required: false
    default: ""
  scope-additional-hard-block-prefixes:
    description: "[DEPRECATED — TY-271, removed in next minor] Use `looppilot-block-paths` instead. Existing values are folded into the new spec as additions, but emit a warning."
    required: false
    default: ""
  looppilot-state-comment-authors:
    description: "Comma-separated GitHub logins trusted to write the hidden state comment. Defaults to 'github-actions[bot]'. Set to your GitHub App slug or machine-user login when the workflow runs with a non-default token."
    required: false
    default: ""

runs:
  using: "node24"
  main: "../../dist/post-fix/index.cjs"
