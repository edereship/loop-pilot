name: "Auto Review Loop — post-fix"
description: "Scope check, CHECK_COMMAND, commit/push, state update, and re-review request after claude-code-action."

inputs:
  github-token:
    description: "GitHub token with contents:write, pull-requests:write, issues:write"
    required: true
  codex-review-request-token:
    description: "Optional token from a Codex-connected user for posting @codex review"
    required: false
    default: ""
  auto-review-push-token:
    description: "Optional token used only for repair commit pushes; defaults to github-token when unset"
    required: false
    default: ""
  pr-number:
    description: "Pull request number"
    required: true
  pr-head-ref:
    description: "PR head branch ref name"
    required: true
  pr-title:
    description: "PR title (kept for parity with pre-fix; unused by post-fix today)"
    required: false
    default: ""
  comment-id:
    description: "Hidden state comment id (output of pre-fix)"
    required: true
  iteration:
    description: "Iteration count (output of pre-fix)"
    required: true
  trigger-comment-id:
    description: "Trigger comment id (output of pre-fix)"
    required: false
    default: "0"
  check-command:
    description: "CHECK_COMMAND (output of pre-fix; can also fall back to wrapping workflow)"
    required: false
    default: "npm run check"
  action-outcome:
    description: "GitHub Actions step.outcome of the preceding claude-code-action step (success | failure | cancelled | skipped)."
    required: false
    default: "success"
  action-execution-file:
    description: "Optional path to the claude-code-action execution output file. Used to distinguish max_turns_exceeded from generic action_failure."
    required: false
    default: ""
  github-repository:
    description: "Repository in owner/name format (auto-detected in GitHub Actions)"
    required: false
    default: ""
  auto-review-hard-block-override:
    description: "Comma-separated repo-relative paths to opt out of the hard-block list (TY-255). Example: 'package.json,tsconfig.json'. Paths under '.github/' are always blocked even when listed here."
    required: false
    default: ""
  scope-allowed-path-prefixes:
    description: "Comma-separated path prefixes the post-fix scope check accepts (TY-266 #7). Example: 'src/,tests/,docs/,packages/'. Empty default keeps src/ + tests/ + docs/."
    required: false
    default: ""
  scope-max-files:
    description: "Max files allowed in a single auto-fix diff (TY-266 #7). Empty / 0 keeps the default of 20. Leave empty so `AUTO_REVIEW_SCOPE_MAX_FILES` Repository variable can override; `core.getInput` treats `\"0\"` as non-empty and would shadow the env-var fallback."
    required: false
    default: ""
  scope-max-lines:
    description: "Max total added+deleted lines allowed in a single auto-fix diff (TY-266 #7). Empty / 0 keeps the default of 1000. Leave empty so `AUTO_REVIEW_SCOPE_MAX_LINES` Repository variable can override."
    required: false
    default: ""
  scope-additional-hard-block-prefixes:
    description: "Comma-separated extra hard-block prefixes (TY-266 #8) to augment the defaults. Trailing slash → directory (`.scripts/`); no trailing slash → exact file match (`Justfile`)."
    required: false
    default: ""

runs:
  using: "node24"
  main: "../../dist/post-fix/index.cjs"
