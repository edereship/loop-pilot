name: "LoopPilot — pre-fix"
description: "Phase 0–3 (label gate, state guards, debounce, findings, judge) and prompt assembly for claude-code-action."

inputs:
  github-token:
    description: "GitHub token with contents:write, pull-requests:write, issues:write"
    required: true
  codex-review-request-token:
    description: "Optional token from a Codex-connected user for posting @codex review"
    required: false
    default: ""
  anthropic-api-key:
    description: "Anthropic API key (forwarded to claude-code-action via the wrapping workflow). Set this OR claude-code-oauth-token (exactly one). Pre-fix validates the pair and fails fast on neither / both."
    required: false
    default: ""
  claude-code-oauth-token:
    description: "Claude Code subscription OAuth token (Pro / Max). Set this OR anthropic-api-key (exactly one)."
    required: false
    default: ""
  pr-number:
    description: "Pull request number"
    required: true
  pr-head-ref:
    description: "PR head branch ref name"
    required: true
  pr-title:
    description: "PR title"
    required: false
    default: ""
  trigger-comment-id:
    description: "ID of the Codex summary comment or PR review that triggered this run"
    required: false
    default: "0"
  trigger-comment-body:
    description: "Body of the Codex summary comment or PR review that triggered this run"
    required: false
    default: ""
  trigger-user-login:
    description: "GitHub login of the user who posted the trigger comment or review"
    required: false
    default: ""
  trigger-event-name:
    description: "GitHub event name that fired the trigger (`issue_comment` or `pull_request_review`). Used by pre-fix to disambiguate the `lastProcessedReviewId` namespace (TY-301 #2). Empty default keeps the pre-TY-301 id-only dedup behaviour."
    required: false
    default: ""
  max-review-iterations:
    description: "Maximum number of review-fix iterations"
    required: false
    default: "20"
  debounce-seconds:
    description: "Seconds to wait after Codex summary comment before collecting inline comments"
    required: false
    default: "90"
  check-command:
    description: "Shell command to run after applying fixes (test/lint/typecheck)"
    required: false
    default: "npm run check"
  build-command:
    description: "Optional shell command run by post-fix after CHECK_COMMAND succeeds, before staging (TY-281). Validated at pre-fix startup so an unsafe value is rejected before claude-code-action runs."
    required: false
    default: ""
  codex-bot-login:
    description: "GitHub login of the Codex bot"
    required: false
    default: "chatgpt-codex-connector[bot]"
  codex-ack-timeout-seconds:
    description: "TY-334: per-attempt seconds pre-fix polls for a Codex ACK (👀 reaction or new Codex activity) after posting @codex review during /restart-review. 0 disables polling."
    required: false
    default: "90"
  codex-ack-poll-interval-seconds:
    description: "TY-334: seconds between ACK polls during /restart-review. Default 15."
    required: false
    default: "15"
  codex-ack-max-reposts:
    description: "TY-334: hard cap on @codex review reposts when no ACK arrives during /restart-review. Default 2, max 3."
    required: false
    default: "2"
  stabilize-interval-seconds:
    description: "Polling interval (seconds) for comment count stabilization safeguard"
    required: false
    default: "10"
  stabilize-count:
    description: "Number of consecutive stable polls before considering comments settled"
    required: false
    default: "3"
  looppilot-label:
    description: "Label name required to run loop-pilot loop. Empty falls back to 'loop-pilot'."
    required: false
    default: ""
  looppilot-full-auto:
    description: "Set to 'true' to disable the label gate and run LoopPilot on every non-fork ready PR."
    required: false
    default: "false"
  looppilot-restart-roles:
    description: "Comma-separated roles allowed to run /restart-review."
    required: false
    default: "author,write,maintain,admin"
  github-repository:
    description: "Repository in owner/name format (auto-detected in GitHub Actions)"
    required: false
    default: ""
  claude-code-model-base:
    description: "Base tier model used when no escalation signal fires. Set this equal to claude-code-model-escalated to operate without tiering."
    required: false
    default: "claude-sonnet-4-6"
  claude-code-model-escalated:
    description: "Escalated tier model used on P0 finding, repeated finding, or after a CHECK_COMMAND failure."
    required: false
    default: "claude-opus-4-7"
  auto-merge-on-clean:
    description: "Set to 'true' to auto-merge (squash) the PR when the loop terminates with done/no_findings. Default 'false' preserves manual merge. Auto-merge waits for every other workflow run on HEAD to settle, refuses to merge if any concluded as failure/cancelled/timed_out/action_required/startup_failure/stale, and bails if HEAD changes during the wait (TY-277)."
    required: false
    default: "false"
  auto-merge-poll-seconds:
    description: "Poll interval (seconds) for the CI wait before auto-merge (TY-277). Default 15. Lower bound 1."
    required: false
    default: "15"
  auto-merge-timeout-minutes:
    description: "Hard timeout (minutes) on the CI wait before auto-merge skips with a warning (TY-277). Default 10. Lower bound 1."
    required: false
    default: "10"
  severity-threshold:
    description: "Severity threshold for the auto-fix pipeline. One of P0|P1|P2|P3. Default 'P3' includes every severity (P0/P1/P2/P3); 'P2' preserves the historical scope (P0/P1/P2 only, skip P3); 'P1'/'P0' narrow further. Invalid values fall back to P3 with a warning (TY-256). NOTE (TY-268 #23): the parser fallback only catches P0 / P1 keywords without an explicit badge — P2/P3 findings without a badge are counted as `unparseable` and skipped, which matters at the default P3 threshold."
    required: false
    default: "P3"
  looppilot-state-comment-authors:
    description: "Comma-separated GitHub logins trusted to write the hidden state comment. Defaults to 'github-actions[bot]'. Set to your GitHub App slug or machine-user login when the workflow runs with a non-default token."
    required: false
    default: ""
  looppilot-block-paths:
    description: "`.gitignore`-style block-path spec (TY-271). Forwarded so the repair prompt's `## Scope Policy` section reflects the operator's effective block-list (TY-350). Empty default keeps the built-in `DEFAULT_BLOCK_PATTERNS`. See docs/operations/scope-policy.md."
    required: false
    default: ""
  scope-max-files:
    description: "Max files allowed in a single auto-fix diff, surfaced in the repair prompt's Scope Policy section (TY-350). Empty / 0 keeps the default of 20. Leave empty so `LOOPPILOT_SCOPE_MAX_FILES` can override; `core.getInput` treats `\"0\"` as non-empty and would shadow the env-var fallback."
    required: false
    default: ""
  scope-max-lines:
    description: "Max total added+deleted lines allowed in a single auto-fix diff, surfaced in the repair prompt's Scope Policy section (TY-350). Empty / 0 keeps the default of 1000. Leave empty so `LOOPPILOT_SCOPE_MAX_LINES` can override."
    required: false
    default: ""

outputs:
  should_run:
    description: "'true' when claude-code-action and post-fix should run for this trigger; 'false' otherwise."
  prompt:
    description: "Prompt to pass to anthropics/claude-code-action@v1 when should_run='true'."
  iteration:
    description: "Iteration count assigned by pre-fix (incremented before claude-code-action runs)."
  check_command:
    description: "CHECK_COMMAND that post-fix should run after the repair."
  pr_head_ref:
    description: "PR head branch name for post-fix to confirm checkout."
  head_sha:
    description: "Commit sha at PR HEAD before claude-code-action ran."
  comment_id:
    description: "Hidden state comment id for post-fix to update."
  trigger_comment_id:
    description: "Trigger comment id, echoed for post-fix telemetry."
  findings_count:
    description: "Number of P0/P1/P2 findings forwarded to claude-code-action."
  allowed_bash_tools:
    description: "Comma-separated Bash(...) entries derived from CHECK_COMMAND for claude-code-action --allowedTools."
  model:
    description: "Claude model selected by the tiering policy. Forwarded to claude-code-action's --model."

runs:
  using: "node24"
  main: "../../dist/pre-fix/index.cjs"
