name: "Auto Review Loop"
description: "Run one Codex review → Claude-Code repair → re-review iteration via anthropics/claude-code-action@v1."

# Composite action wiring the three-step Workflow B repair pipeline:
#   1. pre-fix         — label gate, state guards, debounce, judge, prompt build
#   2. claude-code-action — repo-level repair executor (anthropics/claude-code-action@v1)
#   3. post-fix        — scope check, CHECK_COMMAND, commit/push, state update,
#                        re-request Codex review
#
# pre-fix decides whether the iteration runs via `should_run`. When false the
# claude-code-action and post-fix steps are skipped — pre-fix has already
# finalized state (done / stopped) for this trigger.

inputs:
  github-token:
    description: "GitHub token with contents:write, pull-requests:write, issues:write"
    required: true
  codex-review-request-token:
    description: "Optional token from a Codex-connected user for posting @codex review"
    required: false
    default: ""
  auto-review-push-token:
    description: "Optional token used only for repair commit pushes; use a machine-user PAT or GitHub App token when required checks must run on repair commits"
    required: false
    default: ""
  anthropic-api-key:
    description: "Anthropic API key for claude-code-action. Set this OR claude-code-oauth-token (exactly one). See docs/operations/security.md (認証)."
    required: false
    default: ""
  claude-code-oauth-token:
    description: "Claude Code subscription OAuth token (Pro / Max, generated via `claude setup-token`). Set this OR anthropic-api-key (exactly one). See docs/operations/security.md (認証)."
    required: false
    default: ""
  pr-number:
    description: "Pull request number"
    required: true
  pr-head-ref:
    description: "PR head branch ref name"
    required: true
  pr-title:
    description: "PR title"
    required: false
    default: ""
  trigger-comment-id:
    description: "ID of the Codex summary comment or PR review that triggered this run"
    required: false
    default: "0"
  trigger-comment-body:
    description: "Body of the Codex summary comment or PR review that triggered this run"
    required: false
    default: ""
  trigger-user-login:
    description: "GitHub login of the user who posted the trigger comment or review"
    required: false
    default: ""
  max-review-iterations:
    description: "Maximum number of review-fix iterations"
    required: false
    default: "20"
  debounce-seconds:
    description: "Seconds to wait after Codex summary comment before collecting inline comments"
    required: false
    default: "90"
  check-command:
    description: "Shell command to run after applying fixes (test/lint/typecheck)"
    required: false
    default: "npm run check"
  build-command:
    description: "Optional shell command run by post-fix after CHECK_COMMAND succeeds, before staging (TY-281). Use this to regenerate build artifacts that are committed to the repo (e.g. `dist/`) so the auto-fix commit cannot drift out of sync with `src/`. Empty default skips the step; chain multiple steps with `&&` or wrap in an npm script."
    required: false
    default: ""
  codex-bot-login:
    description: "GitHub login of the Codex bot"
    required: false
    default: "chatgpt-codex-connector[bot]"
  codex-review-marker:
    description: "Text marker in Codex summary comment"
    required: false
    default: "Codex Review"
  stabilize-interval-seconds:
    description: "Polling interval (seconds) for comment count stabilization safeguard"
    required: false
    default: "10"
  stabilize-count:
    description: "Number of consecutive stable polls before considering comments settled"
    required: false
    default: "3"
  auto-review-label:
    description: "Label name required to run auto-review-fix loop. Empty falls back to 'auto-review-fix'."
    required: false
    default: ""
  auto-review-full-auto:
    description: "Set to 'true' to disable the label gate and run auto-review on every non-fork ready PR."
    required: false
    default: "false"
  auto-review-restart-roles:
    description: "Comma-separated roles allowed to run /restart-review."
    required: false
    default: "author,write,maintain,admin"
  claude-code-model-base:
    description: "Base tier model used when no escalation signal fires. See docs/operations/security.md (model selection). Set this equal to claude-code-model-escalated to operate without tiering."
    required: false
    default: "claude-sonnet-4-6"
  claude-code-model-escalated:
    description: "Escalated tier model used when a P0 finding is present, the previous iteration's CHECK_COMMAND failed, or the same findings hash repeats at the base tier."
    required: false
    default: "claude-opus-4-7"
  claude-code-max-turns:
    description: "Value forwarded to claude-code-action's --max-turns argument."
    required: false
    default: "40"
  github-repository:
    description: "Repository in owner/name format (auto-detected in GitHub Actions)"
    required: false
    default: ""
  auto-merge-on-clean:
    description: "Set to 'true' to auto-merge (squash) the PR when the loop terminates with done/no_findings. Default 'false' preserves manual merge. Auto-merge waits for every other workflow run on HEAD to settle, refuses to merge if any concluded as failure/cancelled/timed_out/action_required/startup_failure/stale, and bails if HEAD changes during the wait (TY-277)."
    required: false
    default: "false"
  auto-merge-poll-seconds:
    description: "Poll interval (seconds) for the CI wait before auto-merge (TY-277). Default 15. Lower bound 1."
    required: false
    default: "15"
  auto-merge-timeout-minutes:
    description: "Hard timeout (minutes) on the CI wait before auto-merge skips with a warning (TY-277). Default 10. Lower bound 1."
    required: false
    default: "10"
  severity-threshold:
    description: "Severity threshold for the auto-fix pipeline. One of P0|P1|P2|P3. Default 'P2' preserves prior behavior; P3 includes everything; P1/P0 narrow the scope. Invalid values fall back to P2 with a warning (TY-256). NOTE (TY-268 #23): the parser fallback only catches P0 / P1 keywords without an explicit badge — P2/P3 findings without a badge are counted as `unparseable` and skipped."
    required: false
    default: "P2"
  auto-review-block-paths:
    description: "`.gitignore`-style block-path spec (TY-271). Comma-separated entries: `secrets/` (dir prefix), `Justfile` (exact file), `!Makefile` (un-block a default). `!.github/...` is ignored — `.github/` is locked. Empty default keeps the built-in `DEFAULT_BLOCK_PATTERNS`. See docs/operations/scope-policy.md."
    required: false
    default: ""
  scope-max-files:
    description: "Max files allowed in a single auto-fix diff. Empty / 0 keeps the default of 20. Leave empty so `AUTO_REVIEW_SCOPE_MAX_FILES` Repository variable can override; `core.getInput` treats `\"0\"` as non-empty and would shadow the env-var fallback."
    required: false
    default: ""
  scope-max-lines:
    description: "Max total added+deleted lines allowed in a single auto-fix diff. Empty / 0 keeps the default of 1000. Leave empty so `AUTO_REVIEW_SCOPE_MAX_LINES` Repository variable can override."
    required: false
    default: ""
  auto-review-hard-block-override:
    description: "[DEPRECATED — TY-271, removed in next minor] Use `auto-review-block-paths` with the `!path` syntax. Existing values are folded into the new spec as removals, but emit a warning."
    required: false
    default: ""
  scope-allowed-path-prefixes:
    description: "[DEPRECATED — TY-271, removed in next minor] The allow-list concept is gone; values are ignored with a warning. The scope check is now a pure block-list."
    required: false
    default: ""
  scope-additional-hard-block-prefixes:
    description: "[DEPRECATED — TY-271, removed in next minor] Use `auto-review-block-paths` instead. Existing values are folded into the new spec as additions, but emit a warning."
    required: false
    default: ""
  auto-review-state-comment-authors:
    description: "Comma-separated GitHub logins trusted to write the hidden state comment. Defaults to 'github-actions[bot]'. Set to your GitHub App slug or machine-user login when the workflow runs with a non-default token."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Pre-fix (Phase 0–3 prep)
      id: pre
      uses: ./loop/pre-fix
      with:
        github-token: ${{ inputs.github-token }}
        codex-review-request-token: ${{ inputs.codex-review-request-token }}
        anthropic-api-key: ${{ inputs.anthropic-api-key }}
        claude-code-oauth-token: ${{ inputs.claude-code-oauth-token }}
        pr-number: ${{ inputs.pr-number }}
        pr-head-ref: ${{ inputs.pr-head-ref }}
        pr-title: ${{ inputs.pr-title }}
        trigger-comment-id: ${{ inputs.trigger-comment-id }}
        trigger-comment-body: ${{ inputs.trigger-comment-body }}
        trigger-user-login: ${{ inputs.trigger-user-login }}
        max-review-iterations: ${{ inputs.max-review-iterations }}
        debounce-seconds: ${{ inputs.debounce-seconds }}
        check-command: ${{ inputs.check-command }}
        codex-bot-login: ${{ inputs.codex-bot-login }}
        codex-review-marker: ${{ inputs.codex-review-marker }}
        stabilize-interval-seconds: ${{ inputs.stabilize-interval-seconds }}
        stabilize-count: ${{ inputs.stabilize-count }}
        auto-review-label: ${{ inputs.auto-review-label }}
        auto-review-full-auto: ${{ inputs.auto-review-full-auto }}
        auto-review-restart-roles: ${{ inputs.auto-review-restart-roles }}
        github-repository: ${{ inputs.github-repository }}
        claude-code-model-base: ${{ inputs.claude-code-model-base }}
        claude-code-model-escalated: ${{ inputs.claude-code-model-escalated }}
        auto-merge-on-clean: ${{ inputs.auto-merge-on-clean }}
        auto-merge-poll-seconds: ${{ inputs.auto-merge-poll-seconds }}
        auto-merge-timeout-minutes: ${{ inputs.auto-merge-timeout-minutes }}
        severity-threshold: ${{ inputs.severity-threshold }}
        auto-review-state-comment-authors: ${{ inputs.auto-review-state-comment-authors }}

    - name: Claude Code Action (repo-level repair)
      id: claude
      if: steps.pre.outputs.should_run == 'true'
      uses: anthropics/claude-code-action@v1
      with:
        # TY-260: pass both credentials through; pre-fix has already enforced
        # that exactly one is non-empty. The upstream SDK ignores the empty
        # one, so this stays a simple straight pass-through with no priority
        # logic on our side.
        anthropic_api_key: ${{ inputs.anthropic-api-key }}
        claude_code_oauth_token: ${{ inputs.claude-code-oauth-token }}
        github_token: ${{ inputs.github-token }}
        prompt: ${{ steps.pre.outputs.prompt }}
        # Tools / model / turn budget are governed by docs/operations/security.md
        # ("Claude Code Action 実行制御"). Bash is allow-listed to the exact
        # commands required for verification — git commit / git push are
        # intentionally excluded so post-fix retains exclusive commit authority.
        #
        # The Bash allowlist is composed dynamically by pre-fix
        # (`allowed_bash_tools`): a baseline (npm setup commands + git
        # read-only) plus the CHECK_COMMAND when it passes the safety
        # whitelist. This lets downstream repositories use non-npm
        # CHECK_COMMAND (pnpm / yarn / pytest / make / …) without
        # exhausting --max-turns on a permission-denied verification step
        # (TY-238). Pre-fix rejects unsafe commands and falls back to the
        # baseline; see src/check-command-allowlist.ts for the rules.
        #
        # `--disallowedTools` explicitly blocks the MCP server tools that
        # could otherwise commit / push / delete files directly and bypass
        # the post-fix scope check + CHECK_COMMAND gate. The corresponding
        # MCP servers are already gated off by claude-code-action's defaults
        # (github_file_ops requires `use_commit_signing: true`; the full
        # github MCP server requires `mcp__github__*` entries in allowedTools),
        # but listing them here keeps the intent durable against future
        # default changes upstream.
        claude_args: >-
          --model ${{ steps.pre.outputs.model }}
          --max-turns ${{ inputs.claude-code-max-turns }}
          --allowedTools "Read,Glob,Grep,Edit,Write,TodoWrite,${{ steps.pre.outputs.allowed_bash_tools }}"
          --disallowedTools "WebFetch,WebSearch,Task,NotebookEdit,mcp__github_file_ops__commit_files,mcp__github_file_ops__delete_files,mcp__github__create_or_update_file,mcp__github__push_files,mcp__github__delete_file,mcp__github__create_branch,mcp__github__create_pull_request,mcp__github__update_pull_request,mcp__github__merge_pull_request,mcp__github__fork_repository"
        # The Codex bot is the canonical Workflow B trigger
        # (pull_request_review.submitted from chatgpt-codex-connector[bot]),
        # so claude-code-action's bot-actor guard must allow it explicitly.
        # `*` is intentionally avoided; only the configured Codex bot login
        # is allowed through.
        allowed_bots: ${{ inputs.codex-bot-login }}

    - name: Post-fix (scope check + CHECK_COMMAND + commit + state)
      if: always() && steps.pre.outputs.should_run == 'true'
      uses: ./loop/post-fix
      with:
        github-token: ${{ inputs.github-token }}
        codex-review-request-token: ${{ inputs.codex-review-request-token }}
        auto-review-push-token: ${{ inputs.auto-review-push-token }}
        pr-number: ${{ inputs.pr-number }}
        pr-head-ref: ${{ steps.pre.outputs.pr_head_ref }}
        pr-title: ${{ inputs.pr-title }}
        comment-id: ${{ steps.pre.outputs.comment_id }}
        iteration: ${{ steps.pre.outputs.iteration }}
        trigger-comment-id: ${{ steps.pre.outputs.trigger_comment_id }}
        check-command: ${{ steps.pre.outputs.check_command }}
        build-command: ${{ inputs.build-command }}
        action-outcome: ${{ steps.claude.outcome }}
        action-execution-file: ${{ steps.claude.outputs.execution_file }}
        github-repository: ${{ inputs.github-repository }}
        auto-review-block-paths: ${{ inputs.auto-review-block-paths }}
        scope-max-files: ${{ inputs.scope-max-files }}
        scope-max-lines: ${{ inputs.scope-max-lines }}
        auto-review-hard-block-override: ${{ inputs.auto-review-hard-block-override }}
        scope-allowed-path-prefixes: ${{ inputs.scope-allowed-path-prefixes }}
        scope-additional-hard-block-prefixes: ${{ inputs.scope-additional-hard-block-prefixes }}
        auto-review-state-comment-authors: ${{ inputs.auto-review-state-comment-authors }}
