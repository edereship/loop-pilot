# LoopPilot Loop — dogfooding caller (Workflow B).
#
# This repo dogfoods LoopPilot through the same reusable workflow external
# adopters consume. Because the caller lives in the SAME repo, it references the
# reusable workflow by local path and forwards secrets with `secrets: inherit`.
# (This means dogfooding exercises the published `Edership/loop-pilot/loop@v1`
# composite action — the realistic adopter path. Source/action regressions are
# gated by the `check` CI job, not by the live loop.)
#
# External adopters use the cross-org form instead (tagged ref + enumerated
# secrets + `language` input) — see the README quickstart and
# `.github/workflows/loop.yml`.
name: LoopPilot Loop

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  loop:
    # The caller job must grant the GITHUB_TOKEN permissions the reusable
    # workflow needs, including `actions: read` for the auto-merge guard.
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    uses: ./.github/workflows/loop.yml
    secrets: inherit
    # language defaults to `node`; this repo is a Node toolchain so no `with:`.
