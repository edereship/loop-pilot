# LoopPilot Loop — reusable workflow (Workflow B: Codex review → Claude fix → re-review).
# Spec: docs/architecture/event-design.md#workflow-b
#
# This is the central, versioned implementation. Adopters write a thin ~22-line
# caller and reference it by tag:
#
#   jobs:
#     loop:
#       permissions:
#         contents: write
#         pull-requests: write
#         issues: write
#         actions: read
#       uses: team-yubune/loop-pilot/.github/workflows/loop.yml@v1
#       secrets:
#         CODEX_REVIEW_REQUEST_TOKEN: ${{ secrets.CODEX_REVIEW_REQUEST_TOKEN }}
#         LOOPPILOT_PUSH_TOKEN:       ${{ secrets.LOOPPILOT_PUSH_TOKEN }}
#         ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
#         CLAUDE_CODE_OAUTH_TOKEN:    ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
#       with:
#         language: node   # node|python|go|rust|none
#
# The trigger events stay in the caller's `on:` (a workflow_call workflow runs on
# the CALLER's events). The label gate, Codex-marker detection, fork guard,
# toolchain setup, and crash fail-safes are all centralized HERE so a marker or
# gate change ships to every adopter via a single `@v1.x` retag.
#
# `vars.*` and the `github` context resolve to the CALLER repository (GitHub
# semantics for reusable workflows), so the thin caller never has to re-plumb
# anything from its own repo. NOTE (TY-350): a Repository variable only takes
# effect if THIS workflow forwards it. Variables the workflow reads directly
# (e.g. the gate label in `if:`) work as-is, but variables consumed by the
# composite `loop` action must be passed through its `with:` block below —
# GitHub does NOT auto-export `vars.*` into the action's process env, so adding
# an operator variable to the README without also wiring it into `with:` here
# silently drops it (that omission was the TY-350 scope-policy bug).
#
# Sub-action refs MUST be `team-yubune/loop-pilot/loop@v1` (NOT `./loop`): a `./`
# ref inside a reusable workflow resolves against the CALLER's checkout, which
# does not contain this repo's action, and would break for every adopter.
name: LoopPilot Loop (reusable)

on:
  workflow_call:
    inputs:
      language:
        description: >-
          Toolchain to provision for CHECK_COMMAND / BUILD_COMMAND:
          node (default) | python | go | rust | none. `none` skips language
          setup entirely (rely on tools preinstalled on the runner, e.g. make).
        type: string
        required: false
        default: "node"
    secrets:
      # GITHUB_TOKEN is provided automatically to reusable workflows and is NOT
      # declared here. Custom secrets must be declared to be readable, and
      # cross-org callers must pass them explicitly (`secrets: inherit` is
      # same-org only). All optional: pre-fix fail-fasts on the auth xor.
      CODEX_REVIEW_REQUEST_TOKEN:
        required: false
      LOOPPILOT_PUSH_TOKEN:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  # actions: read is required by the LOOPPILOT_AUTO_MERGE guard (TY-277):
  # `mergeIfChecksPass` reads `/repos/.../actions/runs?head_sha=...` to
  # verify every other workflow run on HEAD finished green before calling
  # `gh pr merge --squash`. Without this scope the API returns 403 and
  # auto-merge would always skip with a warning even on clean CI. The CALLER
  # job must also grant this (a reusable workflow's token permissions are
  # capped by the caller), so the README caller sample includes it.
  actions: read

jobs:
  auto-fix:
    concurrency:
      group: pr-${{ github.event.issue.number || github.event.pull_request.number }}-auto-fix
      cancel-in-progress: false
    # Default-strict label gate with full-auto opt-out (fast skip; runtime re-check
    # is performed inside loop main):
    #   - vars.LOOPPILOT_FULL_AUTO == 'true' → gate disabled, every non-fork PR proceeds
    #   - otherwise (default) → PR must carry the gate label
    #     `vars.LOOPPILOT_LABEL || 'loop-pilot'`.
    #     `issue_comment.created` exposes labels under github.event.issue.labels;
    #     `pull_request_review.submitted` under github.event.pull_request.labels.
    #
    # Recovery commands (`/restart-review`) bypass the label
    # gate so operators can recover a stopped loop or restart a completed loop
    # even after the gate label has been removed. The
    # fork guard inside steps and the runtime permission check in
    # handleRestartCommand still apply.
    #
    # TY-272 #C: gate the restart trigger on `author_association` so a public-PR
    # commenter cannot spin up Workflow B runs (and burn Actions minutes /
    # concurrency slots) before the inner permission check rejects them.
    # `OWNER` / `MEMBER` / `COLLABORATOR` are the GitHub-asserted trusted
    # associations; any drive-by commenter falls outside this set and the
    # workflow simply won't start.
    #
    # PR 作者は `author_association` が `CONTRIBUTOR` / `FIRST_TIME_CONTRIBUTOR`
    # / `NONE` の場合でも、`looppilot-restart-roles` の default に `author`
    # が含まれている限り restart 権限を持つ (`canRestart` で許可される)。
    # その経路を残すため、author == commenter の場合は author_association
    # の枠を緩める。これにより外部コントリビューターの PR 作者が `/restart-review`
    # で復旧する経路が welcoming されたまま、関係ない第三者の連投だけが弾かれる。
    if: >
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        (
          github.event.comment.body == '/restart-review' ||
          startsWith(github.event.comment.body, '/restart-review ')
        ) &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR' ||
          github.event.comment.user.login == github.event.issue.user.login
        )
      ) ||
      (
        (
          vars.LOOPPILOT_FULL_AUTO == 'true' ||
          contains(github.event.issue.labels.*.name, vars.LOOPPILOT_LABEL || 'loop-pilot') ||
          contains(github.event.pull_request.labels.*.name, vars.LOOPPILOT_LABEL || 'loop-pilot')
        ) &&
        (
          (
            github.event_name == 'issue_comment' &&
            github.event.issue.pull_request &&
            (
              github.event.comment.user.login == 'chatgpt-codex-connector[bot]' ||
              (vars.CODEX_BOT_LOGIN != '' && github.event.comment.user.login == vars.CODEX_BOT_LOGIN)
            ) &&
            (
              contains(github.event.comment.body, 'Codex Review') ||
              (vars.CODEX_REVIEW_MARKER != '' && contains(github.event.comment.body, vars.CODEX_REVIEW_MARKER)) ||
              contains(github.event.comment.body, 'Codex usage limit') ||
              contains(github.event.comment.body, 'Codex quota') ||
              contains(github.event.comment.body, 'Codex rate limit') ||
              contains(github.event.comment.body, 'Codex limit') ||
              contains(github.event.comment.body, 'Codex usage cap') ||
              contains(github.event.comment.body, 'Codex is rate limited')
            )
          ) ||
          (
            github.event_name == 'pull_request_review' &&
            github.event.review.state == 'commented' &&
            (
              github.event.review.user.login == 'chatgpt-codex-connector[bot]' ||
              (vars.CODEX_BOT_LOGIN != '' && github.event.review.user.login == vars.CODEX_BOT_LOGIN)
            ) &&
            (
              contains(github.event.review.body, 'Codex Review') ||
              (vars.CODEX_REVIEW_MARKER != '' && contains(github.event.review.body, vars.CODEX_REVIEW_MARKER)) ||
              contains(github.event.review.body, 'Codex usage limit') ||
              contains(github.event.review.body, 'Codex quota') ||
              contains(github.event.review.body, 'Codex rate limit') ||
              contains(github.event.review.body, 'Codex limit') ||
              contains(github.event.review.body, 'Codex usage cap') ||
              contains(github.event.review.body, 'Codex is rate limited')
            )
          )
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Get PR info
        id: pr
        run: |
          PR_DATA=$(gh api "/repos/${REPO}/pulls/${PR_NUM}")

          DELIM="EOF_$(openssl rand -hex 8)"

          echo "head_ref<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$PR_DATA" | jq -r '.head.ref' >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

          echo "head_sha<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$PR_DATA" | jq -r '.head.sha' >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

          echo "title<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$PR_DATA" | jq -r '.title' >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

          # .head.repo can be null for deleted fork repos — default to empty
          FORK_NAME=$(echo "$PR_DATA" | jq -r '.head.repo.full_name // empty')
          echo "fork<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$FORK_NAME" >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.issue.number || github.event.pull_request.number }}

      - name: Check fork PR (security guard)
        if: steps.pr.outputs.fork == '' || steps.pr.outputs.fork != github.repository
        run: |
          echo "::error::Fork PR detected or source repo unknown. LoopPilot is disabled for fork PRs."
          exit 1

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 1

      # ── Toolchain setup (switchable via the `language` input) ───────────────
      # Provisions the runtime that CHECK_COMMAND / BUILD_COMMAND need. The
      # composite `loop` action itself runs on the runner's bundled Node, so
      # `language` only governs the verification environment. `node` preserves
      # the historical default (setup-node + npm ci); other values let non-Node
      # adopters switch with a single caller input instead of editing steps.
      - name: Setup Node toolchain
        if: inputs.language == 'node'
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies for check command
        if: inputs.language == 'node' && hashFiles('package-lock.json') != ''
        run: npm ci

      - name: Setup Python toolchain
        if: inputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies for check command
        if: inputs.language == 'python' && hashFiles('requirements.txt') != ''
        run: python -m pip install -r requirements.txt

      - name: Setup Go toolchain
        if: inputs.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Setup Rust toolchain
        if: inputs.language == 'rust'
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Configure git user for commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run auto-fix loop
        id: loop
        # Pinned path@ref (NOT `./loop`): inside a reusable workflow a `./` ref
        # resolves against the caller's checkout. Keep this `@v1` in sync with
        # releases — the release.yml ref guard (TY-342) enforces it.
        uses: team-yubune/loop-pilot/loop@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          codex-review-request-token: ${{ secrets.CODEX_REVIEW_REQUEST_TOKEN }}
          looppilot-push-token: ${{ secrets.LOOPPILOT_PUSH_TOKEN }}
          # TY-260: pass both auth secrets through. Pre-fix fails fast unless
          # exactly one is non-empty, so the deploying repo can pick API key
          # billing or a Pro / Max subscription OAuth token by setting only
          # the corresponding `secrets.*`.
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          pr-number: ${{ github.event.issue.number || github.event.pull_request.number }}
          pr-head-ref: ${{ steps.pr.outputs.head_ref }}
          pr-title: ${{ steps.pr.outputs.title }}
          trigger-comment-id: ${{ github.event.comment.id || github.event.review.id }}
          trigger-comment-body: ${{ github.event.comment.body || github.event.review.body }}
          trigger-user-login: ${{ github.event.comment.user.login || github.event.review.user.login }}
          # TY-301 #2: pass the event name so pre-fix can disambiguate
          # issue_comment.id and pull_request_review.id when comparing against
          # `lastProcessedReviewId` — the two IDs are drawn from separate
          # namespaces and can theoretically collide.
          trigger-event-name: ${{ github.event_name }}
          max-review-iterations: ${{ vars.MAX_REVIEW_ITERATIONS || '20' }}
          debounce-seconds: ${{ vars.DEBOUNCE_SECONDS || '90' }}
          check-command: ${{ vars.CHECK_COMMAND || 'npm run check' }}
          build-command: ${{ vars.BUILD_COMMAND || '' }}
          codex-bot-login: ${{ vars.CODEX_BOT_LOGIN || 'chatgpt-codex-connector[bot]' }}
          # TY-334: in-job @codex review ACK polling. 0 disables; defaults keep
          # timeout × (max-reposts + 1) well under the 30-min job timeout.
          codex-ack-timeout-seconds: ${{ vars.CODEX_ACK_TIMEOUT_SECONDS || '90' }}
          codex-ack-poll-interval-seconds: ${{ vars.CODEX_ACK_POLL_INTERVAL_SECONDS || '15' }}
          codex-ack-max-reposts: ${{ vars.CODEX_ACK_MAX_REPOSTS || '2' }}
          stabilize-interval-seconds: ${{ vars.STABILIZE_INTERVAL_SECONDS || '10' }}
          stabilize-count: ${{ vars.STABILIZE_COUNT || '3' }}
          looppilot-label: ${{ vars.LOOPPILOT_LABEL || '' }}
          looppilot-full-auto: ${{ vars.LOOPPILOT_FULL_AUTO || 'false' }}
          looppilot-restart-roles: ${{ vars.LOOPPILOT_RESTART_ROLES || 'author,write,maintain,admin' }}
          # Model tiering (TY-241, simplified in TY-242).
          # Set BASE === ESCALATED to operate without tiering.
          claude-code-model-base: ${{ vars.CLAUDE_CODE_MODEL_BASE || 'claude-sonnet-4-6[1m]' }}
          claude-code-model-escalated: ${{ vars.CLAUDE_CODE_MODEL_ESCALATED || 'claude-opus-4-6[1m]' }}
          claude-code-max-turns: ${{ vars.CLAUDE_CODE_MAX_TURNS || '40' }}
          auto-merge-on-clean: ${{ vars.LOOPPILOT_AUTO_MERGE || 'false' }}
          auto-merge-poll-seconds: ${{ vars.LOOPPILOT_AUTO_MERGE_POLL_SECONDS || '15' }}
          auto-merge-timeout-minutes: ${{ vars.LOOPPILOT_AUTO_MERGE_TIMEOUT_MINUTES || '10' }}
          severity-threshold: ${{ vars.LOOPPILOT_SEVERITY_THRESHOLD || 'P3' }}
          # TY-272 #A: trusted state-comment author override. Empty falls
          # back to `github-actions[bot]`. Set the Repository variable when
          # state comments are authored by a GitHub App / machine user.
          looppilot-state-comment-authors: ${{ vars.LOOPPILOT_STATE_COMMENT_AUTHORS }}
          # TY-350: scope-policy Repository variables. These reach the composite
          # ONLY as action inputs — `vars.*` are not auto-exported to the
          # action's process env, so an omitted input silently ignores the
          # operator's setting (and post-fix's scope_violation / too_many_*
          # recovery hints then point at variables that do nothing). The
          # scope-max-* values are passed BARE (no `|| '0'`): an unset variable
          # yields '' so the composite's empty-string default and the
          # LOOPPILOT_SCOPE_MAX_* env-var fallback still apply, whereas a literal
          # '0' would be treated as set by core.getInput and shadow that
          # fallback. See docs/operations/scope-policy.md.
          looppilot-block-paths: ${{ vars.LOOPPILOT_BLOCK_PATHS }}
          scope-max-files: ${{ vars.LOOPPILOT_SCOPE_MAX_FILES }}
          scope-max-lines: ${{ vars.LOOPPILOT_SCOPE_MAX_LINES }}

      # TY-282 #2B: workflow-level fail-safe. If the composite `loop` action
      # ends in `failure` or `cancelled` we cannot rely on `postStopComment`
      # firing from inside `demoteFixingOnCrash` (e.g. token revoked, GitHub
      # API outage, Node process killed before the catch handler runs, or a
      # job-level timeout that cancels the step). This step talks to the
      # GitHub API directly with the workflow's bundled `GITHUB_TOKEN` and
      # posts a top-level ⚠️ comment so the operator at least *knows* the
      # loop stopped, even when every code-path inside the action has
      # already gone silent. The comment intentionally links the workflow
      # run rather than the (potentially stale) status comment.
      #
      # The guard intentionally inspects `steps.loop.conclusion` rather than
      # `failure()`:
      #   - `failure()` is true when *any* previous step failed, so an
      #     earlier guard (Get PR info, Check fork PR, npm ci) failing
      #     leaves `steps.loop.conclusion == 'skipped'` and would otherwise
      #     post a misleading "LoopPilot crashed" comment for events the
      #     loop never even saw.
      #   - GitHub Actions exposes cancellation via `cancelled()` separately
      #     from `failure()`. Keying on the conclusion captures both real
      #     loop crashes and job-timeout cancellations in a single check.
      # `always()` is required so this step still runs after a failed step;
      # without it, `if:` defaults to an implicit `success()` AND.
      #
      # Dedup with 2A (Codex review on PR #96): when `demoteFixingOnCrash`
      # successfully posts the in-process ⚠️ stop notification, this step
      # would otherwise post a *second* ⚠️ comment for the same crash. The
      # design intent of 2B is to backstop 2A when 2A *cannot* fire — so
      # before posting we check whether a recent in-process stop comment
      # exists from `github-actions[bot]`. If so, 2A handled it cleanly
      # and 2B has nothing to add. The window is short (90s) so unrelated
      # earlier stops on the same PR cannot accidentally suppress us, and
      # the dedup check falls open (treats the API as if no recent stop
      # exists) on any failure so 2B's safety-net property is preserved.
      - name: Post crash notification on workflow failure
        if: >
          always() &&
          (steps.loop.conclusion == 'failure' ||
           steps.loop.conclusion == 'cancelled')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.issue.number || github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          LOOP_CONCLUSION: ${{ steps.loop.conclusion }}
          # Trusted state-comment authors (TY-272 #A). The healthy-state gate
          # below must accept the same authors readState uses, so a GitHub App /
          # machine-user deployment is covered too — not just github-actions[bot].
          STATE_AUTHORS: ${{ vars.LOOPPILOT_STATE_COMMENT_AUTHORS }}
        run: |
          set -euo pipefail
          # BUG-2 (TY-339): a job-timeout (`cancelled`) that lands AFTER the loop
          # has advanced the hidden state to `waiting_codex` (repair committed +
          # pushed + `@codex review` re-requested) or `done` (completed, possibly
          # mid auto-merge wait) is NOT a crash — the in-job Codex ACK poll
          # (post-fix, TY-334) or the done-path auto-merge wait can run long
          # enough to be cancelled here even though the loop succeeded. Posting
          # "⚠️ LoopPilot crashed … /restart-review --hard" then misleads the
          # operator into wiping iteration history and double-posting `@codex
          # review`.
          #
          # The healthy-state skip is restricted to the `cancelled` path on
          # purpose (Codex P2 on PoC #147 — "require fresh state"): a genuine
          # pre-fix / post-fix crash surfaces as conclusion=`failure` (via
          # runIfNotVitest → core.setFailed), NOT `cancelled`. Skipping on
          # `failure` too would let an early pre-fix crash that left a PREVIOUS
          # run's `waiting_codex` / `done` state in place be silently suppressed,
          # so the operator would never learn this run crashed. Reaching a
          # healthy state AND being cancelled only happens when THIS run advanced
          # the state and then got cancelled in its long-running tail (a
          # cancellation during `fixing` leaves `status: fixing`, which is not
          # skipped below), so `cancelled` is a reliable proxy for "this run did
          # the work"; `failure` always falls through to the crash post.
          #
          # Reading the state robustly:
          #   * Honor `LOOPPILOT_STATE_COMMENT_AUTHORS` (mirrors
          #     buildTrustedAuthorJqFilter) so non-default state authors are read.
          #   * Iterate authors as a quoted array so bracketed bot names
          #     (`my-app[bot]`) are not glob-expanded against the checkout.
          #   * Anchor on the visible header `startswith("LoopPilot state is
          #     stored in this comment.")` (same as readState) so operational
          #     comments that merely QUOTE the `<!-- looppilot-state` marker
          #     are not read as state.
          #   * Decode ONLY the newest matching state comment (`@base64 | tail`),
          #     so a corrupted newest comment falls open (posts the crash).
          # The grep matches the unescaped JSON field (`"status": "…"`), so a
          # `"status"` token in `previousCheckFailure` (escaped) cannot spoof it.
          if [ "${LOOP_CONCLUSION:-}" = "cancelled" ]; then
            AUTHOR_FILTER='.user.login == "github-actions[bot]"'
            if [ -n "${STATE_AUTHORS:-}" ]; then
              IFS=',' read -ra _authors <<< "$STATE_AUTHORS" || true
              for _a in "${_authors[@]:-}"; do
                _a=$(printf '%s' "$_a" | tr -d '[:space:]')
                if printf '%s' "$_a" | grep -qE '^[A-Za-z0-9_-]+(\[bot\])?$'; then
                  AUTHOR_FILTER="$AUTHOR_FILTER or .user.login == \"$_a\""
                fi
              done
            fi
            NEWEST_STATE_B64=$(gh api --paginate \
              "repos/${REPO}/issues/${PR_NUM}/comments" \
              --jq ".[] | select($AUTHOR_FILTER) | select(.body | startswith(\"LoopPilot state is stored in this comment.\")) | select(.body | contains(\"<!-- looppilot-state\")) | .body | @base64" \
              2>/dev/null | tail -n1 || true)
            STATE_STATUS=""
            if [ -n "${NEWEST_STATE_B64:-}" ]; then
              STATE_STATUS=$(printf '%s' "$NEWEST_STATE_B64" | base64 -d 2>/dev/null | grep -oE '"status": "(waiting_codex|done|fixing|stopped|initialized)"' | head -n1 | grep -oE '(waiting_codex|done|fixing|stopped|initialized)' || true)
            fi
            if [ "${STATE_STATUS:-}" = "waiting_codex" ] || [ "${STATE_STATUS:-}" = "done" ]; then
              echo "::notice::Loop was cancelled but hidden state is '${STATE_STATUS}' — it committed its work before the job ended; skipping the crash notification."
              exit 0
            fi
          fi
          # Dedup window: look for any `⚠️ **LoopPilot stopped**` body
          # authored by github-actions[bot] in the last 90s. That string
          # is the literal prefix `buildTerminalNotificationBody` emits
          # for every `stopped` terminal notification, so a hit means 2A
          # (or `postStopComment` from `failureExit`) already covered
          # this crash. Network / parse errors default to 0 so we still
          # post the fail-safe.
          SINCE=$(date -u -d '90 seconds ago' +%Y-%m-%dT%H:%M:%SZ)
          # TY-310 #1: `--paginate` walks every comment in the 90s window. The
          # old `per_page=100` (no pagination) returned only the OLDEST 100
          # comments — GitHub serves issue comments in ascending chronological
          # order — so on a high-traffic PR the recent 2A stop notification
          # could fall outside the page and 2B would post a duplicate. We emit
          # one `.id` per matching comment and count lines with `grep -c`,
          # because `--paginate` runs the `--jq` filter per page: a
          # `[.[] | ...] | length` would print one count per page and break the
          # `-gt 0` numeric test below.
          RECENT_STOP=$(gh api --paginate \
            "repos/${REPO}/issues/${PR_NUM}/comments?since=${SINCE}" \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | startswith("⚠️ **LoopPilot stopped**"))) | .id' \
            2>/dev/null | grep -c . || true)
          if [ "${RECENT_STOP:-0}" -gt 0 ]; then
            echo "::notice::TY-282 2A already posted a top-level stop notification within 90s (${RECENT_STOP} found); skipping 2B fail-safe to avoid duplicate."
            exit 0
          fi
          BODY=$'⚠️ **LoopPilot crashed** — the auto-fix loop step ended with conclusion `'"$LOOP_CONCLUSION"$'` before the in-process stop notification could post.\n\nThe hidden state may still be `fixing`; the next `/restart-review` (or the next pre-fix run on this PR) will demote it to `stopped / workflow_crashed`. Use `/restart-review` to resume — add `--hard` if iteration history needs clearing.\n\nWorkflow run: '"$RUN_URL"
          gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
            --method POST \
            --raw-field body="$BODY" \
            >/dev/null || echo "::warning::Failed to post crash notification comment via gh api; check GITHUB_TOKEN scope."

      # TY-283: complement to TY-282 #2B. The #2B guard intentionally requires
      # `steps.loop.conclusion == 'failure' || 'cancelled'`, which means an
      # earlier step failing (e.g. `Get PR info`, `Check fork PR`,
      # `actions/checkout`, `actions/setup-node`, `npm ci`) leaves
      # `steps.loop.conclusion == 'skipped'` and produces NO PR notification —
      # the operator cannot tell from the PR alone that LoopPilot tried to
      # run and failed. TY-276 PR #97 observed this when a `node-version-file`
      # misconfiguration killed `setup-node` 10 seconds in; the loop never
      # started and the PR went silent for a full Codex iteration.
      #
      # This step fires on the exact complement: `failure()` is true AND the
      # loop step was skipped (= the failure was in an earlier step). It is
      # mutually exclusive with #2B because the conclusion check partitions
      # the failure space (`skipped` vs `failure`/`cancelled`). No dedup with
      # #2A is needed because the Node process for `loop` never ran, so
      # `postStopComment` could not have fired.
      #
      # The fail-safe intentionally does NOT touch `looppilot-state`. Early-
      # step failures happen before any state mutation, so the existing
      # `waiting_codex` (or `done`/`stopped`) remains accurate; the next valid
      # Codex review trigger will reconcile naturally. The message keeps the
      # detail vague (the workflow YAML cannot reliably tell which early step
      # died) and just links the workflow run — Actions UI provides per-step
      # logs for root-cause investigation.
      - name: Post early-step failure notification
        # `cancelled()` is required in addition to `failure()`: a job timeout
        # (`timeout-minutes: 30`) or a manual workflow cancel during an early
        # step gives that step conclusion `cancelled`, leaves the loop step
        # `skipped`, and `failure()` returns false — so a bare `failure()`
        # would silently skip this fail-safe. TY-282 #2B already handles
        # cancellation via `loop.conclusion == 'cancelled'` directly.
        if: >
          always() &&
          (failure() || cancelled()) &&
          steps.loop.conclusion == 'skipped'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.issue.number || github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          BODY=$'⚠️ **LoopPilot Workflow B failed before the auto-fix loop could start.**\n\nThe failure happened in an early setup step (e.g. `actions/checkout`, `actions/setup-node`, `npm ci`, or the PR info / fork guard step). The looppilot-state was not modified — the next valid Codex review will retry the loop (TY-283).\n\nWorkflow run: '"$RUN_URL"
          gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
            --method POST \
            --raw-field body="$BODY" \
            >/dev/null || echo "::warning::Failed to post early-step failure notification via gh api; check GITHUB_TOKEN scope."
