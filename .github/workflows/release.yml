# Tag-driven release pipeline (TY-342).
#
# Trigger: pushing a semantic tag `vX.Y.Z`. The moving major tag (`v1`, no dots)
# does NOT match `v*.*.*`, so moving it from inside this job cannot re-trigger
# the workflow (no recursion).
#
# Steps: verify package.json version matches the tag, rebuild the bundle and
# fail on dist/ drift (never ship a stale dist), verify the composite action's
# sub-action `@vMAJOR` refs match this tag, move the moving major tag to this
# commit, and create the GitHub Release.
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create releases and force-update the moving major tag

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so the moving tag push is a force-update over any prior ref

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches the tag
        run: |
          set -euo pipefail
          EXPECTED="${GITHUB_REF_NAME#v}" # v1.2.3 -> 1.2.3
          ACTUAL="$(node -p "require('./package.json').version")"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::package.json version ($ACTUAL) does not match release tag ${GITHUB_REF_NAME} (expected $EXPECTED). Bump package.json to $EXPECTED, commit, and retag — releasing now would ship a version-mismatched artifact."
            exit 1
          fi
          echo "OK: package.json version $ACTUAL matches ${GITHUB_REF_NAME}"

      - name: Verify dist/ is in sync with src/ at the tag
        run: |
          npm run bundle
          status="$(git status --porcelain dist/)"
          if [ -n "$status" ]; then
            echo "$status"
            echo "::error::dist/ is out of sync with src/ at ${GITHUB_REF_NAME}. Run 'npm run bundle', commit, and retag — releasing now would ship a stale bundle."
            exit 1
          fi

      - name: Verify sub-action refs match this release major
        run: npm run check:action-refs -- "${GITHUB_REF_NAME}"

      - name: Move the moving major tag to this commit
        run: |
          set -euo pipefail
          MAJOR="${GITHUB_REF_NAME%%.*}" # v1.2.3 -> v1
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$GITHUB_SHA"
          git push -f origin "refs/tags/${MAJOR}"
          echo "Moved ${MAJOR} -> ${GITHUB_SHA}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::Release $TAG already exists; skipping creation."
            exit 0
          fi
          gh release create "$TAG" --title "$TAG" --verify-tag --generate-notes
