# LoopPilot Init — dogfooding caller (Workflow A).
#
# This repo dogfoods LoopPilot through the same reusable workflow external
# adopters consume. Because the caller lives in the SAME repo, it references the
# reusable workflow by local path and forwards secrets with `secrets: inherit`.
#
# External adopters use the cross-org form instead (tagged ref + enumerated
# secrets) — see the README quickstart and `.github/workflows/init.yml`.
name: LoopPilot Init

on:
  pull_request:
    types: [opened, ready_for_review, labeled]

jobs:
  init:
    # The caller job must grant the GITHUB_TOKEN permissions the reusable
    # workflow needs (a reusable workflow's token is capped by the caller).
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: ./.github/workflows/init.yml
    secrets: inherit
