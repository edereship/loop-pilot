# Workflow A: PR creation initialization
# Spec: docs/architecture/event-design.md#workflow-a
name: Auto Review Init

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  init:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check fork PR (security guard)
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::Fork PR detected. Auto-review is disabled for fork PRs."
          exit 1

      - name: Run init
        run: npx tsx src/main-init.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
