# Workflow A: PR creation → initialize auto-review
# Spec: docs/architecture/event-design.md#workflow-a
#
# Usage in other repos:
#   - uses: your-org/auto-review-action/init@v1
#     with:
#       github-token: ${{ secrets.GITHUB_TOKEN }}
#       codex-review-request-token: ${{ secrets.CODEX_REVIEW_REQUEST_TOKEN }}
#       pr-number: ${{ github.event.pull_request.number }}
name: Auto Review Init

on:
  pull_request:
    types: [opened, ready_for_review, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  init:
    # Label-based opt-in:
    #   - vars.AUTO_REVIEW_LABEL == ''  → gating disabled. Only `opened`/`ready_for_review`
    #     start the loop; `labeled` events are ignored so adding any label to a PR
    #     does NOT reset state and re-post `@codex review` (PoC-compatible behavior).
    #   - vars.AUTO_REVIEW_LABEL set    → PR must currently carry the gate label, AND
    #     for `labeled` events the just-added label must match (so adding an unrelated
    #     label to a PR-without-the-gate-label is a no-op).
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        (vars.AUTO_REVIEW_LABEL == '' && github.event.action != 'labeled') ||
        (
          vars.AUTO_REVIEW_LABEL != '' &&
          contains(github.event.pull_request.labels.*.name, vars.AUTO_REVIEW_LABEL) &&
          (github.event.action != 'labeled' || github.event.label.name == vars.AUTO_REVIEW_LABEL)
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check fork PR (security guard)
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::Fork PR detected. Auto-review is disabled for fork PRs."
          exit 1

      - name: Run init
        uses: ./init
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          codex-review-request-token: ${{ secrets.CODEX_REVIEW_REQUEST_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
