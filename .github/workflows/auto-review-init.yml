# Workflow A: PR creation → initialize auto-review
# Spec: docs/architecture/event-design.md#workflow-a
#
# Usage in other repos:
#   - uses: your-org/auto-review-action/init@v1
#     with:
#       github-token: ${{ secrets.GITHUB_TOKEN }}
#       pr-number: ${{ github.event.pull_request.number }}
name: Auto Review Init

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  init:
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check fork PR (security guard)
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::Fork PR detected. Auto-review is disabled for fork PRs."
          exit 1

      - name: Run init
        uses: ./init
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
