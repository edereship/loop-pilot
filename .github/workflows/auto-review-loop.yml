# Workflow B: Codex review received → Claude fix → re-review
# Spec: docs/architecture/event-design.md#workflow-b
#
# Usage in other repos:
#   - uses: your-org/auto-review-action/loop@v1
#     with:
#       github-token: ${{ secrets.GITHUB_TOKEN }}
#       anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
#       pr-number: ${{ github.event.issue.number }}
#       pr-head-ref: ${{ steps.pr.outputs.head_ref }}
#       pr-title: ${{ steps.pr.outputs.title }}
#       trigger-comment-id: ${{ github.event.comment.id }}
name: Auto Review Loop

on:
  issue_comment:
    types: [created]

concurrency:
  group: pr-${{ github.event.issue.number }}-auto-fix
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-fix:
    if: >
      github.event.issue.pull_request &&
      (github.event.comment.user.login == vars.CODEX_BOT_LOGIN || github.event.comment.user.login == 'chatgpt-codex-connector[bot]') &&
      (contains(github.event.comment.body, vars.CODEX_REVIEW_MARKER) || contains(github.event.comment.body, 'Codex Review'))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Get PR info
        id: pr
        run: |
          PR_DATA=$(gh api "/repos/${REPO}/pulls/${PR_NUM}")

          DELIM="EOF_$(openssl rand -hex 8)"

          echo "head_ref<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$PR_DATA" | jq -r '.head.ref' >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

          echo "head_sha<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$PR_DATA" | jq -r '.head.sha' >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

          echo "title<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$PR_DATA" | jq -r '.title' >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

          # .head.repo can be null for deleted fork repos — default to empty
          FORK_NAME=$(echo "$PR_DATA" | jq -r '.head.repo.full_name // empty')
          echo "fork<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$FORK_NAME" >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.issue.number }}

      - name: Check fork PR (security guard)
        if: steps.pr.outputs.fork == '' || steps.pr.outputs.fork != github.repository
        run: |
          echo "::error::Fork PR detected or source repo unknown. Auto-review is disabled for fork PRs."
          exit 1

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Configure git user for commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run auto-fix loop
        uses: ./loop
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          pr-number: ${{ github.event.issue.number }}
          pr-head-ref: ${{ steps.pr.outputs.head_ref }}
          pr-title: ${{ steps.pr.outputs.title }}
          trigger-comment-id: ${{ github.event.comment.id }}
          max-review-iterations: ${{ vars.MAX_REVIEW_ITERATIONS || '20' }}
          debounce-seconds: ${{ vars.DEBOUNCE_SECONDS || '90' }}
          check-command: ${{ vars.CHECK_COMMAND || 'npm run check' }}
          max-files-per-iteration: ${{ vars.MAX_FILES_PER_ITERATION || '10' }}
          max-input-tokens-per-file: ${{ vars.MAX_INPUT_TOKENS_PER_FILE || '30000' }}
          codex-bot-login: ${{ vars.CODEX_BOT_LOGIN || 'chatgpt-codex-connector[bot]' }}
          codex-review-marker: ${{ vars.CODEX_REVIEW_MARKER || 'Codex Review' }}

      # PoC: Save Codex comments as artifact for parser validation
      - name: Save Codex comments as artifact
        if: always()
        run: |
          mkdir -p artifacts
          gh api "/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}/comments" \
            --paginate --jq '.[]' | jq -s '.' > artifacts/review-comments.json || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codex-comments-${{ github.event.issue.number }}-${{ github.run_number }}
          path: artifacts/
          retention-days: 30
