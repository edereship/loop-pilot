name: "LoopPilot Init"
description: "Initialize the Codex review × Claude fix auto-loop for a PR"

inputs:
  github-token:
    description: "GitHub token with contents:read, pull-requests:write, issues:write"
    required: true
  codex-review-request-token:
    description: "Optional token from a Codex-connected user for posting @codex review"
    required: false
    default: ""
  pr-number:
    description: "Pull request number"
    required: true
  github-repository:
    description: "Repository in owner/name format (auto-detected in GitHub Actions)"
    required: false
    default: ""
  max-review-iterations:
    description: "Maximum number of Codex review / Claude fix iterations per PR. Must match the value configured in the loop workflow (MAX_REVIEW_ITERATIONS / vars.MAX_REVIEW_ITERATIONS). Pass the same vars.MAX_REVIEW_ITERATIONS (default 20) so the initial status comment reflects the actual cap. See README quickstart for the recommended expression."
    required: false
    default: "20"
  looppilot-state-comment-authors:
    description: "Comma-separated GitHub logins trusted to write the hidden state comment. Defaults to 'github-actions[bot]'. Set to your GitHub App slug or machine-user login when the workflow runs with a non-default token."
    required: false
    default: ""
  codex-bot-login:
    description: "GitHub login of the Codex bot (TY-334). Used by the in-job ACK poll to recognise Codex's 👀 reaction / activity on the @codex review request. Must match the loop workflow's CODEX_BOT_LOGIN."
    required: false
    default: "chatgpt-codex-connector[bot]"
  codex-ack-timeout-seconds:
    description: "TY-334: per-attempt seconds to poll for a Codex ACK (👀 reaction or new Codex activity) after posting @codex review. 0 disables ACK polling. Max 120 so timeout × (max-reposts + 1) stays under the job timeout."
    required: false
    default: "90"
  codex-ack-poll-interval-seconds:
    description: "TY-334: seconds between ACK polls. Default 15."
    required: false
    default: "15"
  codex-ack-max-reposts:
    description: "TY-334: hard cap on @codex review reposts when no ACK arrives. After this many, init demotes to stopped/codex_request_failed. Default 2, max 3."
    required: false
    default: "2"

runs:
  using: "node24"
  main: "../dist/init/index.cjs"
